name: Auto Generator Video Zodiak & Shio

on:
  schedule:
    # Jalan setiap hari jam 22:00 UTC (Setara jam 05:00 WIB pagi)
    - cron: '0 22 * * *'
  
  workflow_dispatch:
    # Memungkinkan tombol "Run workflow" secara manual di menu Actions

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    
    # Menjalankan 5 channel sekaligus menggunakan matrix
    strategy:
      fail-fast: false
      matrix:
        channel_id: 1
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies (FFmpeg & Fonts)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-liberation fonts-dejavu

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pillow edge-tts google-api-python-client google-auth-oauthlib google-auth-httplib2

      - name: Run Script Channel ${{ matrix.channel_id }}
        env:
          # API Keys Global
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          
          # Channel Configuration ID
          CHANNEL_ID: ${{ matrix.channel_id }}
          
          # YouTube Credentials dinamis (sesuai matrix ID)
          YT_CREDS_1: ${{ secrets.YT_CREDS_1 }}
          YT_CREDS_2: ${{ secrets.YT_CREDS_2 }}
          YT_CREDS_3: ${{ secrets.YT_CREDS_3 }}
          YT_CREDS_4: ${{ secrets.YT_CREDS_4 }}
          YT_CREDS_5: ${{ secrets.YT_CREDS_5 }}
        run: |
          python main.py

      - name: Archive Artifacts (Optional Debugging)
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: channel-${{ matrix.channel_id }}-logs
          path: |
            narasi.txt
            ffmpeg_log.txt
            thumbnail.jpg
          retention-days: 1
